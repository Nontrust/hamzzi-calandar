# OpenSpec 보조 설정(프로젝트 문맥 공유용)
# 참고: CLI 기본 구조는 openspec/specs 및 openspec/changes 이다.

project:
  name: "햄찌의 뽀짝 하루 캘린더 (커플 스터디)"
  language: "ko-KR"
  description: "스터디 실행, 추억 보상, 시험 일정 연동, AI 모의면접, 음악 링크 기능"

inputs:
  spec_globs:
    - "specs/**/*.md"
    - "changes/**/*.md"
  entrypoints:
    - "specs/user-role-selection/spec.md"
    - "specs/study-execution/spec.md"
    - "specs/memory-reward-system/spec.md"
    - "specs/exam-schedule-integration/spec.md"
    - "specs/ai-interview-coaching/spec.md"
    - "specs/music-playlist-links/spec.md"
    - "specs/privacy-and-permissions/spec.md"

outputs:
  out_dir: "generated"
  artifacts:
    - type: "tickets"
      format: "markdown"
      path: "generated/tickets"
    - type: "architecture"
      format: "markdown"
      path: "generated/architecture"
    - type: "prompts"
      format: "markdown"
      path: "generated/prompts"

quality:
  style:
    - "OpenSpec 산출물 markdown 본문은 한국어를 기본으로 사용"
    - "영어는 코드/명령어/식별자 표기에만 사용"
    - "Requirement는 한국어 규범 문장(시스템은 ... 해야 한다)으로 작성"
    - "Scenario는 WHEN/THEN 형식 유지"
    - "에러/예외와 상태 전이 규칙을 명시"
  acceptance_tests_required: true

ai:
  model: "gpt-5"
  temperature: 0.2
  max_output_tokens: 2000

workflow:
  steps:
    - "핵심 capability 스펙 확정"
    - "변경안(proposal/specs/design/tasks) 작성"
    - "검증 후 구현 진행"

