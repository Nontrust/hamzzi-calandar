schema: spec-driven

context: |
  Product: 공기업 합격 코치 (커플 스터디)
  Primary users:
  - 사용자 A: 설정/관리/보상 콘텐츠 관리
  - 사용자 B: 스터디 실행/모의면접 사용자
  Glossary: openspec/docs/glossary.md

  Canonical capabilities:
  - user-role-selection
  - study-execution
  - memory-reward-system
  - exam-schedule-integration
  - ai-interview-coaching
  - music-playlist-links
  - privacy-and-permissions

  Writing conventions:
  - 모든 OpenSpec 산출물(.md)은 기본적으로 한국어로 작성한다.
  - 영어 사용은 코드, API 이름, CLI 명령어, 고유 식별자에 한해 허용한다.
  - Requirement 문장은 영어 규범 문장으로 작성하고 SHALL 또는 MUST를 포함한다.
  - Scenario는 한국어로 작성하되 WHEN/THEN 형식을 유지한다.
  - 구현 세부보다 사용자 행동과 시스템 보장을 우선 서술한다.

rules:
  proposal:
    - 모든 본문 섹션(Why/What Changes/Capabilities/Impact)은 한국어로 작성한다.
    - MVP 범위와 Out of Scope를 명시한다.
    - 외부 연동(API/Calendar) 실패 시 대응 전략을 포함한다.
  specs:
    - Purpose, Requirement 이름, Scenario 이름/설명은 한국어로 작성한다.
    - 각 스펙은 Purpose 1개와 Requirement 2~5개를 유지한다.
    - 각 Requirement는 최소 1개의 Scenario를 포함한다.
    - Requirement 이름은 기능 의도가 드러나는 도메인 용어를 사용한다.
  design:
    - Context, Goals/Non-Goals, Decisions, Risks/Trade-offs는 한국어로 작성한다.
    - 데이터 모델 변경점과 상태 전이 규칙을 명시한다.
    - 예외/실패 처리(재시도, 중복 제거, 권한 거부)를 포함한다.
  tasks:
    - 작업 설명과 검증 문구는 한국어로 작성한다.
    - 사용자 가치가 완결되는 단위로 작업을 분할한다.
    - 각 작업에 검증 방법(테스트/수동 검증)을 함께 적는다.
